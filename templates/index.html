<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student List</h1>

<div class="container">

<a href="/add" class="add-btn">Add Student</a>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Marks</th>
        <th>Actions</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>

        <td>
            <a href="/update/{{ student[0] }}" class="edit-btn">Edit</a>
            <a href="/delete/{{ student[0] }}" class="delete-btn">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</div>

</body>
</html>
