<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
</head>
<body>

    <h2>Student List</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Marks</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/">Back to Home</a>

    <td>
    <a href="/update/{{ student[0] }}">
        Edit
    </a>
</td>

</body>
</html>
